services:
  redis:
    image: redis:8.6.2-alpine
    container_name: event_platform_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: always
    env_file:
      - ./.env
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
      
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis_commander
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - backend
    # http://localhost:8081

  postgres:
    image: postgres:15
    restart: always
    env_file:
      - ./.env
    ports:                 
      - "5432:5432" 
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db.init.sql:/docker-entrypoint-initdb.d/db.init.sql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_ui
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - backend
    depends_on:
      - postgres
    # http://localhost:5050

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: always
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      CLUSTER_ID: 'icwm1FTEQfip7aHDNLx-Qg'

    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - backend
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    restart: always
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    networks:
      - backend
    depends_on:
      - kafka
    #view at  http://localhost:8080

  gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    command: npm run dev
    working_dir: /app/api-gateway
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./api-gateway:/app/api-gateway
      - ./utils:/app/utils
      - /app/api-gateway/node_modules
    restart: always
    env_file:
      - ./api-gateway/.env
    ports:
      - "3000:3000"
    depends_on:
      auth:
        condition: service_started
      user:
        condition: service_started
      event:
        condition: service_started
      booking:
        condition: service_started
      payment:
        condition: service_started
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30m
      timeout: 5s
      retries: 5
      
  auth:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    command: npm run dev
    working_dir: /app/auth-service
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./auth-service:/app/auth-service
      - ./utils:/app/utils
      - /app/auth-service/node_modules
    restart: always      
    env_file:
      - ./auth-service/.env
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30m
      timeout: 5s
      retries: 5

  user:
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    command: npm run dev
    working_dir: /app/user-service
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./user-service:/app/user-service
      - ./utils:/app/utils
      - /app/user-service/node_modules
    restart: always      
    env_file:
      - ./user-service/.env
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 30m
      timeout: 5s
      retries: 5
  
  event:
    build:
      context: .
      dockerfile: ./event-service/Dockerfile
    command: npm run dev
    working_dir: /app/event-service
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./event-service:/app/event-service
      - ./utils:/app/utils
      - /app/event-service/node_modules
    restart: always      
    env_file:
      - ./event-service/.env
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/health"]
      interval: 30m
      timeout: 5s
      retries: 5

  booking:
    build:
      context: .
      dockerfile: ./booking-service/Dockerfile
    command: npm run dev
    working_dir: /app/booking-service
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./booking-service:/app/booking-service
      - ./utils:/app/utils
      - /app/booking-service/node_modules
    restart: always      
    env_file:
      - ./booking-service/.env
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3004/health"]
      interval: 30m
      timeout: 5s
      retries: 5
    
  payment:
    build:
      context: .
      dockerfile: ./payment-service/Dockerfile
    command: npm run dev
    working_dir: /app/payment-service
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./payment-service:/app/payment-service
      - ./utils:/app/utils
      - /app/payment-service/node_modules
    restart: always      
    env_file:
      - ./payment-service/.env
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3005/health"]
      interval: 30m
      timeout: 5s
      retries: 5
      
  saga-orchestrator:
    build:
      context: .
      dockerfile: ./saga-orchestrator-service/Dockerfile
    command: npm run dev
    working_dir: /app/saga-orchestrator-service
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./saga-orchestrator-service:/app/saga-orchestrator-service
      - ./utils:/app/utils
      - /app/saga-orchestrator-service/node_modules
    restart: always      
    env_file:
      - ./saga-orchestrator-service/.env
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3006/health"]
      interval: 30m
      timeout: 5s
      retries: 5

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: always
    ports:
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - http
      - gateway:3000
    depends_on:
      - gateway
    networks:
      - backend

    # http://localhost:4040/inspect/http 

volumes:
  pgdata:
  redis_data:
  kafka_data:
  
networks:
  backend:
    driver: bridge
