services:
  postgres:
    image: postgres:15
    restart: always
    env_file:
      - ./.env.postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    restart: always
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1

      # Zookeeper
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Listeners (Docker-internal)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Single-node safe defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Stability
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - backend

  gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    restart: always
    env_file:
      - ./api-gateway/.env
    ports:
      - "3000:3000"
    depends_on:
      auth:
        condition: service_started
      user:
        condition: service_started
    networks:
      - backend
      
  auth:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    restart: always      
    env_file:
      - ./auth-service/.env
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - backend

  user:
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    restart: always      
    env_file:
      - ./user-service/.env
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - ./user-service:/app/user-service
  
  event:
    build:
      context: .
      dockerfile: ./event-service/Dockerfile
    restart: always      
    env_file:
      - ./event-service/.env
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - ./event-service:/app/event-service

  saga-orchestrator:
    build:
      context: .
      dockerfile: ./saga-orchestrator-service/Dockerfile
    restart: always      
    env_file:
      - ./saga-orchestrator-service/.env
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - backend

volumes:
  pgdata:

networks:
  backend:
    driver: bridge
