services:
  redis:
    image: redis:alpine
    container_name: event_platform_redis
    # This command sets the password using the env variable
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
      
  postgres:
    image: postgres:15
    restart: always
    env_file:
      - ./.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: always
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      CLUSTER_ID: 'icwm1FTEQfip7aHDNLx-Qg'

    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - backend

  gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    restart: always
    env_file:
      - ./api-gateway/.env
    ports:
      - "3000:3000"
    depends_on:
      auth:
        condition: service_started
      user:
        condition: service_started
      event:
        condition: service_started
      booking:
        condition: service_started
      payment:
        condition: service_started
    networks:
      - backend
      
  auth:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    restart: always      
    env_file:
      - ./auth-service/.env
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend

  user:
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    restart: always      
    env_file:
      - ./user-service/.env
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_started        
    networks:
      - backend
  
  event:
    build:
      context: .
      dockerfile: ./event-service/Dockerfile
    restart: always      
    env_file:
      - ./event-service/.env
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_started        
    networks:
      - backend

  booking:
    build:
      context: .
      dockerfile: ./booking-service/Dockerfile
    restart: always      
    env_file:
      - ./booking-service/.env
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend
    
  payment:
    build:
      context: .
      dockerfile: ./payment-service/Dockerfile
    restart: always      
    env_file:
      - ./payment-service/.env
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend
      
  saga-orchestrator:
    build:
      context: .
      dockerfile: ./saga-orchestrator-service/Dockerfile
    restart: always      
    env_file:
      - ./saga-orchestrator-service/.env
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend

volumes:
  pgdata:
  redis_data:
  kafka_data:

networks:
  backend:
    driver: bridge
