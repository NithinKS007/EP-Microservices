syntax = "proto3";

package event.v1;

import "google/protobuf/timestamp.proto";

service EventService {
  rpc LockSeats(LockSeatsRequest) returns (LockSeatsResponse);
  rpc ConfirmSeats(ConfirmSeatsRequest) returns (ConfirmSeatsResponse);
  rpc ReleaseSeats(ReleaseSeatsRequest) returns (ReleaseSeatsResponse);
  rpc BulkReleaseSeats(BulkReleaseSeatsRequest) returns (BulkReleaseSeatsResponse);
  rpc MarkEventCancelled(MarkEventCancelledRequest) returns (MarkEventCancelledResponse);
  rpc FindEventsByIdsWithSeats(FindEventsByIdsWithSeatsRequest) returns (FindEventsByIdsWithSeatsResponse);
}

message EventWithSeats {
  string id = 1;
  string name = 2;
  string description = 3;
  string venue_name = 4;
  google.protobuf.Timestamp event_date = 5;
  EventStatus status = 6;

  repeated Seat seats = 7;

  optional google.protobuf.Timestamp created_at = 8;
  optional google.protobuf.Timestamp updated_at = 9;
}

message Seat {
  string id = 1;
  string event_id = 2;
  string seat_number = 3;
  SeatTier seat_tier = 4;
  double price = 5;

  SeatStatus seat_status = 6;
  string locked_by_booking_id = 7;
  google.protobuf.Timestamp lock_expires_at = 8;

  optional google.protobuf.Timestamp created_at = 9;
  optional google.protobuf.Timestamp updated_at = 10;
}

enum EventStatus {
  EVENT_STATUS_UNSPECIFIED = 0;
  EVENT_STATUS_ACTIVE = 1;
  EVENT_STATUS_CANCELLED = 2;
}

enum SeatStatus {
  SEAT_STATUS_UNSPECIFIED = 0;
  SEAT_STATUS_AVAILABLE = 1;
  SEAT_STATUS_LOCKED = 2;
  SEAT_STATUS_SOLD = 3;
}

enum SeatTier {
  SEAT_TIER_UNSPECIFIED = 0;
  SEAT_TIER_VIP = 1;
  SEAT_TIER_REGULAR = 2;
  SEAT_TIER_ECONOMY = 3;
}

message FindEventsByIdsWithSeatsRequest {
  repeated string event_ids = 1;
  optional int32 seat_page = 2;
  optional int32 seat_limit = 3;
  repeated string seat_ids = 4;
}

message FindEventsByIdsWithSeatsResponse {
  bool success = 1;
  string message = 2;
  repeated EventWithSeats events = 3;
}

message LockSeatsRequest {
  string event_id = 1;
  repeated string seat_ids = 2;
  string booking_id = 3;
  google.protobuf.Timestamp expires_at = 4;
}

message LockSeatsResponse {
  bool success = 1;
  string message = 2;
}

message ConfirmSeatsRequest {
  string booking_id = 1;
}

message ConfirmSeatsResponse {
  bool success = 1;
  string message = 2;
}

message ReleaseSeatsRequest {
  string booking_id = 1;
}

message ReleaseSeatsResponse {
  bool success = 1;
  string message = 2;
}

message BulkReleaseSeatsRequest {
  repeated string booking_ids = 1;
}

message BulkReleaseSeatsResponse {
  bool success = 1;
  string message = 2;
  int32 affected_count = 3;
}

message MarkEventCancelledRequest {
  string event_id = 1;
}

message MarkEventCancelledResponse {
  bool success = 1;
  string message = 2;
}
